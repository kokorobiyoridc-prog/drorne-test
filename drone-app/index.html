<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2等口述試験：完全対策</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fafafa; margin: 0; padding: 10px; }
        
        /* 切り替えボタンのスタイル */
        .nav-menu { margin-bottom: 10px; display: flex; justify-content: center; gap: 5px; }
        .nav-menu button { padding: 10px; cursor: pointer; border: none; border-radius: 5px; background: #ddd; }
        .nav-menu button.active { background: #007bff; color: white; }

        .container { position: relative; display: inline-block; width: 100%; max-width: 500px; background: #fff; border-radius: 10px; overflow: hidden; }
        img { width: 100%; height: auto; display: block; }

        /* 点検ボタン（共通） */
        .dot { position: absolute; width: 50px; height: 50px; background: rgba(255, 165, 0, 0.5); border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); display: none; }
        .dot.active { background: rgba(0, 255, 0, 0.7); border-color: green; }

        /* モードごとのボタンを表示するための魔法 */
        [data-mode="top"] .mode-top { display: block; }
        [data-mode="bottom"] .mode-bottom { display: block; }
        [data-mode="radio"] .mode-radio { display: block; }

        #msg { margin-top: 15px; padding: 15px; background: #333; color: #fff; border-radius: 5px; min-height: 24px; }
    </style>
</head>
<body data-mode="top">

    <h3>2等点検シミュレーター</h3>

    <div class="nav-menu">
        <button id="btn-top" class="active" onclick="changeMode('top')">上面</button>
        <button id="btn-bottom" onclick="changeMode('bottom')">下面</button>
        <button id="btn-radio" onclick="changeMode('radio')">送信機</button>
    </div>

    <div class="container" id="main-container">
        <img src="drone_top.png" id="main-img">

        <div class="dot mode-top" style="top: 25%; left: 25%;" onclick="show('上面プロペラ：異常なし！', this)"></div>
        <div class="dot mode-top" style="top: 50%; left: 50%;" onclick="show('識別番号：表示よし！', this)"></div>

        <div class="dot mode-bottom" style="top: 40%; left: 50%;" onclick="show('下面センサー：汚れなし！', this)"></div>
        <div class="dot mode-bottom" style="top: 70%; left: 50%;" onclick="show('バッテリー：ロックよし！', this)"></div>

        <div class="dot mode-radio" style="top: 30%; left: 30%;" onclick="show('スティック：動作スムーズ、戻りよし！', this)"></div>
        <div class="dot mode-radio" style="top: 50%; left: 50%;" onclick="show('アンテナ：損傷なし、向きよし！', this)"></div>
    </div>

    <div id="msg">モードを選んで点検開始</div>

    <script>
        // モード（画像とボタンのセット）を切り替える関数
        function changeMode(mode) {
            // 全体のモードを書き換え
            document.body.setAttribute('data-mode', mode);
            
            // 画像を切り替え
            const img = document.getElementById('main-img');
            img.src = 'drone_' + mode + '.png'; // drone_top.png などを探す
            
            // ボタンの見た目（青色）を切り替え
            document.querySelectorAll('.nav-menu button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            
            document.getElementById('msg').innerText = mode + "の点検準備完了";
        }

        function show(text, element) {
            document.getElementById('msg').innerText = text;
            element.classList.add('active');
        }
    </script>
</body>
</html>
