<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>口述試験用点検シミュレーター：飛行前後対応版</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fafafa; margin: 0; padding: 10px; }

        /* ナビゲーションメニュー */
        .nav-container { margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .nav-menu { display: flex; justify-content: center; gap: 5px; }
        .nav-menu button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 5px; background: #ddd; font-weight: bold; }
        .nav-menu button.active { background: #007bff; color: white; }
        
        /* 飛行前後ボタン専用の色 */
        #btn-pre.active { background: #28a745; } /* 飛行前は緑 */
        #btn-post.active { background: #dc3545; } /* 飛行後は赤 */

        .container { position: relative; display: inline-block; width: 100%; max-width: 500px; background: #fff; border: 1px solid #ccc; }
        img { width: 100%; height: auto; display: block; }

        /* 点検ボタン（共通） */
        .dot {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: rgba(255, 165, 0, 0.5);
            border: 2px solid orange;
            border-radius: 50%;
            display: none; /* JSとCSSで制御 */
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.2s;
            z-index: 10;
        }

        .dot.active {
            background-color: rgba(0, 255, 0, 0.7) !important;
            border-color: green !important;
        }

        /* プロペラ専用（ドーナツ型） */
        .dot.propeller {
            width: 140px !important;
            height: 140px !important;
            background: transparent !important;
            border: none !important;
            pointer-events: none;
            z-index: 20;
        }
        .dot.propeller svg { width: 100%; height: 100%; pointer-events: none; }
        .dot.propeller svg path { pointer-events: auto; cursor: pointer; }
        .dot.propeller.active svg path { fill: rgba(0, 255, 0, 0.8) !important; }

        /* =========================================
           表示・非表示のロジック
           ========================================= */
        /* 場所モードの制御 */
        [data-mode="top"] .mode-top { display: none; }
        [data-mode="bottom"] .mode-bottom { display: none; }
        [data-mode="radio"] .mode-radio { display: none; }

        /* タイミング(Pre/Post)と場所の組み合わせが一致した時だけ表示 */
        body[data-mode="top"][data-timing="pre"] .mode-top.pre { display: block; }
        body[data-mode="top"][data-timing="post"] .mode-top.post { display: block; }
        
        body[data-mode="bottom"][data-timing="pre"] .mode-bottom.pre { display: block; }
        body[data-mode="bottom"][data-timing="post"] .mode-bottom.post { display: block; }
        
        body[data-mode="radio"][data-timing="pre"] .mode-radio.pre { display: block; }
        body[data-mode="radio"][data-timing="post"] .mode-radio.post { display: block; }

        #msg { margin-top: 15px; padding: 15px; background: #333; color: #fff; border-radius: 5px; min-height: 24px; font-weight: bold; }
    </style>
</head>
<body data-mode="top" data-timing="pre">
    <h3>2等口述試験用・点検シミュレーター</h3>

    <div class="nav-container">
        <!-- 場所の切り替え -->
        <div class="nav-menu">
            <button id="btn-top" class="active" onclick="changeMode('top')">上面</button>
            <button id="btn-bottom" onclick="changeMode('bottom')">下面</button>
            <button id="btn-radio" onclick="changeMode('radio')">送信機</button>
        </div>
        <!-- 飛行前後タイミングの切り替え -->
        <div class="nav-menu">
            <button id="btn-pre" class="active" onclick="changeTiming('pre')">飛行前点検</button>
            <button id="btn-post" onclick="changeTiming('post')">飛行後点検</button>
        </div>
    </div>

    <div class="container" id="main-container">
        <img src="drone_top.PNG" id="main-img"> 

        <!-- 上面：プロペラ（前・後 両方で必要） -->
        <!-- pre と post 両方のクラスをつけることで両方のモードで出ます -->
        <div class="dot mode-top propeller pre post" style="top: 15%; left: 0%;" onclick="show('左上プロペラ：異常なし。よし！', this)">
            <svg viewBox="0 0 100 100"><path fill="rgba(255, 165, 0, 0.8)" fill-rule="evenodd" d="M50,0 A50,50 0 1,0 50,100 A50,50 0 1,0 50,0 Z M50,15 A35,35 0 1,1 50,85 A35,35 0 1,1 50,15 Z" /></svg>
        </div>
        <div class="dot mode-top propeller pre post" style="top: 15%; left: 72%;" onclick="show('右上プロペラ：異常なし。よし！', this)">
            <svg viewBox="0 0 100 100"><path fill="rgba(255, 165, 0, 0.8)" fill-rule="evenodd" d="M50,0 A50,50 0 1,0 50,100 A50,50 0 1,0 50,0 Z M50,15 A35,35 0 1,1 50,85 A35,35 0 1,1 50,15 Z" /></svg>
        </div>
        <div class="dot mode-top propeller pre post" style="top: 57%; left: 5%;" onclick="show('左下プロペラ：異常なし。よし！', this)">
            <svg viewBox="0 0 100 100"><path fill="rgba(255, 165, 0, 0.8)" fill-rule="evenodd" d="M50,0 A50,50 0 1,0 50,100 A50,50 0 1,0 50,0 Z M50,15 A35,35 0 1,1 50,85 A35,35 0 1,1 50,15 Z" /></svg>
        </div>
        <div class="dot mode-top propeller pre post" style="top: 57%; left: 65%;" onclick="show('右下プロペラ：異常なし。よし！', this)">
            <svg viewBox="0 0 100 100"><path fill="rgba(255, 165, 0, 0.8)" fill-rule="evenodd" d="M50,0 A50,50 0 1,0 50,100 A50,50 0 1,0 50,0 Z M50,15 A35,35 0 1,1 50,85 A35,35 0 1,1 50,15 Z" /></svg>
        </div>

        <!-- モーター：飛行前 -->
        <div class="dot mode-top pre" style="top: 24.5%; left: 11.5%;" onclick="show('左上モーター：回転スムーズ。よし！', this)"></div>
        <div class="dot mode-top pre" style="top: 24.5%; left: 83.5%;" onclick="show('右上モーター：回転スムーズ。よし！', this)"></div>
        <!-- モーター：飛行後（メッセージを変える） -->
        <div class="dot mode-top post" style="top: 24.5%; left: 11.5%;" onclick="show('左上モーター：異常な熱なし。よし！', this)"></div>
        <div class="dot mode-top post" style="top: 24.5%; left: 83.5%;" onclick="show('右上モーター：異常な熱なし。よし！', this)"></div>

        <!-- その他（上面） -->
        <div class="dot mode-top pre" style="top: 28%; left: 47.5%;" onclick="show('識別番号：表示よし！', this)"></div>
        <div class="dot mode-top post" style="top: 50%; left: 47.5%;" onclick="show('機体全体：著しい汚れ、損傷なし。よし！', this)"></div>

        <!-- 下面 -->
        <div class="dot mode-bottom pre" style="top: 25%; left: 47.5%;" onclick="show('カメラ：カバー取り外し、損傷なし。よし！', this)"></div>
        <div class="dot mode-bottom post" style="top: 25%; left: 47.5%;" onclick="show('カメラ：損傷、ゴミ付着なし。よし！', this)"></div>
        <div class="dot mode-bottom pre post" style="top: 53%; left: 38%; width: 120px; height: 120px;" onclick="show('下面センサー：汚れなし。よし！', this)"></div>

        <!-- 送信機 -->
        <div class="dot mode-radio pre" style="top: 55%; left: 36%;" onclick="show('スティック：動作スムーズ、戻りよし！', this)"></div>
        <div class="dot mode-radio pre" style="top: 13%; left: 50%; width: 90px; height: 30px;" onclick="show('アンテナ：損傷なし。向きよし！', this)"></div>
        <div class="dot mode-radio post" style="top: 75%; left: 48%;" onclick="show('送信機：電源OFFよし！', this)"></div>
    </div>

    <div id="msg">飛行前点検を開始してください</div>

    <script>
        function changeMode(mode) {
            document.body.setAttribute('data-mode', mode);
            const img = document.getElementById('main-img');
            img.src = 'drone_' + mode + '.PNG';

            document.querySelectorAll('.nav-menu button').forEach(b => {
                if(b.id.includes('top') || b.id.includes('bottom') || b.id.includes('radio')) {
                    b.classList.remove('active');
                }
            });
            document.getElementById('btn-' + mode).classList.add('active');
            updateMsg();
        }

        function changeTiming(timing) {
            document.body.setAttribute('data-timing', timing);
            
            document.getElementById('btn-pre').classList.remove('active');
            document.getElementById('btn-post').classList.remove('active');
            document.getElementById('btn-' + timing).classList.add('active');

            // モード切り替え時に一度チェック状態をリセットしたい場合はここに追加
            // document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            
            updateMsg();
        }

        function updateMsg() {
            const mode = document.body.getAttribute('data-mode');
            const timing = document.body.getAttribute('data-timing');
            const tText = timing === 'pre' ? '飛行前' : '飛行後';
            const mText = mode === 'top' ? '上面' : mode === 'bottom' ? '下面' : '送信機';
            document.getElementById('msg').innerText = tText + "：" + mText + "の点検準備完了";
        }

        function show(text, element) {
            document.getElementById('msg').innerText = text;
            element.classList.add('active');
        }
    </script>
</body>
</html>
