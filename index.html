<head>
    <meta charset="UTF-8">

    <title>口述試験用点検シミュレーター：飛行前後対応版</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fafafa; margin: 0; padding: 10px; }

        /* ナビゲーションメニュー */
        .nav-container { margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .nav-menu { display: flex; justify-content: center; gap: 5px; }
        .nav-menu button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 5px; background: #ddd; font-weight: bold; }
        .nav-menu button.active { background: #007bff; color: white; }
        
        /* 飛行前後ボタン専用の色 */
        #btn-pre.active { background: #28a745; } /* 飛行前は緑 */
        #btn-post.active { background: #dc3545; } /* 飛行後は赤 */

        .container { position: relative; display: inline-block; width: 100%; max-width: 500px; background: #fff; border: 1px solid #ccc; }
        img { width: 100%; height: auto; display: block; }

        /* 点検ボタン（共通） */
        .dot {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: rgba(255, 165, 0, 0.5);
            border: 2px solid orange;
            border-radius: 50%;
            display: none; /* JSとCSSで制御 */
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.2s;
            z-index: 10;
        }

        .dot.active {
            background-color: rgba(0, 255, 0, 0.7) !important;
            border-color: green !important;
        }

        /* プロペラ専用（ドーナツ型） */
        .dot.propeller {
            width: 100px !important;
            height: 80px !important;
            background: transparent !important;
            border: none !important;
            pointer-events: none;
            z-index: 20;
        }
        .dot.propeller svg { width: 100%; height: 100%; pointer-events: none; }
        .dot.propeller svg path { pointer-events: auto; cursor: pointer; }
        .dot.propeller.active svg path { fill: rgba(0, 255, 0, 0.8) !important; }

        /* =========================================
           表示・非表示のロジック
           ========================================= */
       /* 1. まず全てのドット（プロペラ含む）を一旦隠す */
.dot { display: none !important; }

/* 2. 「場所」と「タイミング」の両方が一致した時だけ表示する */
body[data-mode="top"][data-timing="pre"] .mode-top.pre { display: flex !important; }
body[data-mode="top"][data-timing="post"] .mode-top.post { display: flex !important; }

body[data-mode="bottom"][data-timing="pre"] .mode-bottom.pre { display: flex !important; }
body[data-mode="bottom"][data-timing="post"] .mode-bottom.post { display: flex !important; }

body[data-mode="radio"][data-timing="pre"] .mode-radio.pre { display: flex !important; }
body[data-mode="radio"][data-timing="post"] .mode-radio.post { display: flex !important; }

      

        #msg { margin-top: 15px; padding: 15px; background: #333; color: #fff; border-radius: 5px; min-height: 24px; font-weight: bold; }
    </style>
</head>

    <script>
        function changeMode(mode) {
            document.body.setAttribute('data-mode', mode);
            const img = document.getElementById('main-img');
            img.src = 'drone_' + mode + '.PNG';

            document.querySelectorAll('.nav-menu button').forEach(b => {
                if(b.id.includes('top') || b.id.includes('bottom') || b.id.includes('radio')) {
                    b.classList.remove('active');
                }
            });
            document.getElementById('btn-' + mode).classList.add('active');
            updateMsg();
        }

        function changeTiming(timing) {
            document.body.setAttribute('data-timing', timing);
            
            document.getElementById('btn-pre').classList.remove('active');
            document.getElementById('btn-post').classList.remove('active');
            document.getElementById('btn-' + timing).classList.add('active');

            // モード切り替え時に一度チェック状態をリセットしたい場合はここに追加
            // document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            
            updateMsg();
        }

        function updateMsg() {
            const mode = document.body.getAttribute('data-mode');
            const timing = document.body.getAttribute('data-timing');
            const tText = timing === 'pre' ? '飛行前' : '飛行後';
            const mText = mode === 'top' ? '上面' : mode === 'bottom' ? '下面' : '送信機';
            document.getElementById('msg').innerText = tText + "：" + mText + "の点検を開始してください";
        }

        function show(text, element) {
            document.getElementById('msg').innerText = text;
            element.classList.add('active');
        }
    </script>
